spring.application.name=houseoflagman

# H2 Datenbank
spring.datasource.url=jdbc:h2:mem:houseoflagman
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (zum Debuggen)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

spring.mvc.format.time=HH:mm

spring.jpa.open-in-view=false

spring.mail.host=mail.infomaniak.com
spring.mail.port=587
spring.mail.username=kontakt@houseoflagman.ch
spring.mail.password=MacVonAyse-120899.
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000