<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | House of Lagman</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body class="admin-body">
<div class="admin-login">
    <div class="admin-login__box">
        <h1>House of Lagman</h1>
        <p>Admin-Bereich</p>

        <div th:if="${param.error}" class="alert alert--info">
            Falscher Benutzername oder Passwort.
        </div>
        <div th:if="${param.logout}" class="alert alert--success">
            Erfolgreich abgemeldet.
        </div>

        <form th:action="@{/admin/login}" method="post">
            <div class="form-group">
                <label>Benutzername</label>
                <input type="text" name="username" placeholder="Benutzername" required>
            </div>
            <div class="form-group">
                <label>Passwort</label>
                <input type="password" name="password" placeholder="Passwort" required>
            </div>
            <button type="submit" class="btn btn--primary" style="width:100%">Anmelden</button>
        </form>
    </div>
</div>
</body>
</html>
