<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Menü')}"></head>
<body>
<header th:replace="~{fragments/layout :: header('menu')}"></header>

<main>
    <div class="menu-hero">
        <div class="menu-hero__left">
            <div class="menu-hero__content">
                <span class="hero__label">LEGENDÄRE SPEZIALITÄT</span>
                <h1>Lagman</h1>
                <p>Handgezogene Nudeln mit Rindfleisch, Paprika und Gemüse in einer kräftigen, würzigen Sauce.</p>
            </div>
        </div>
        <div class="menu-hero__image" style="background-image: url('/images/lagman2.jpg'); background-size: cover; background-position: center; height: 60vh; width: 100%;">
        </div>
    </div>

    <section class="menu-content">
        <nav class="menu-tabs">
            <div class="menu-tabs__links">
                <a th:each="cat : ${categories}"
                   th:href="@{/menu(categoryId=${cat.id})}"
                   th:text="${cat.name}"
                   th:classappend="${cat.id == selectedCategory?.id} ? 'active'">
                </a>
            </div>
            <a href="/menu.pdf" class="btn btn--outline">⬇ Menü herunterladen (PDF)</a>
        </nav>

        <div class="menu-section">
            <h2 th:text="${selectedCategory?.name}"></h2>
            <p th:text="${selectedCategory?.description}" class="menu-section__subtitle"></p>

            <div class="menu-grid">
                <div th:each="item : ${items}" class="menu-card">
                    <img th:src="${item.imageUrl}" th:alt="${item.name}" class="menu-card__image">
                    <div class="menu-card__body">
                        <div class="menu-card__header">
                            <h3 th:text="${item.name}"></h3>
                            <span class="menu-card__price" th:text="|CHF ${#numbers.formatInteger(item.price, 1)}|"></span>
                        </div>
                        <p th:text="${item.description}"></p>
                        <div class="menu-card__footer">
                            <div class="menu-card__variants">
    <span th:if="${item.hasVegetarian}" class="variant-icon" title="Vegetarisch erhältlich">
        <img src="/images/icons/blatt.svg" alt="Vegetarisch">
    </span>
                                <span th:if="${item.hasChicken}" class="variant-icon" title="Mit Poulet erhältlich">
        <img src="/images/icons/poulet.svg" alt="Poulet">
    </span>
                                <span th:if="${item.hasBeef}" class="variant-icon" title="Mit Rindfleisch erhältlich">
        <img src="/images/icons/rind.svg" alt="Rindfleisch">
    </span>
                            </div>
                            <span th:if="${item.recommended}" class="badge">EMPFEHLUNG</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
